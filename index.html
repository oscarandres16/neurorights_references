<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Referencias - Trabajo de Grado</title>
  <style>
    :root {
      --rojo: #b30000;
      --negro: #121212;
      --blanco: #ffffff;
      --gris-suave: #f7f7f7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(130deg, #ffffff 0%, #fff8f8 45%, #ffe3e3 78%, #ffc8c8 100%);
      color: var(--negro);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
    }

    .card {
      width: min(900px, 95vw);
      background: rgba(255, 255, 255, 0.96);
      color: var(--negro);
      border-top: 8px solid var(--rojo);
      border-radius: 10px;
      box-shadow: 0 12px 30px rgba(179, 0, 0, 0.16);
      padding: 2rem;
      backdrop-filter: blur(2px);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .logo {
      width: clamp(90px, 14vw, 130px);
      height: auto;
      display: block;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 2vw + 1rem, 2.3rem);
      letter-spacing: 0.4px;
    }

    .subtitle {
      margin: 0.4rem 0 1.5rem;
      color: #444;
      font-size: 0.98rem;
    }

    .work-info {
      margin: 0 0 1rem;
      padding: 0.75rem 0.9rem;
      background: #fff4f4;
      border-left: 3px solid var(--rojo);
      border-radius: 6px;
    }

    .work-title,
    .work-author,
    .work-director {
      margin: 0.15rem 0;
      font-size: 0.96rem;
      color: #2b2b2b;
      line-height: 1.45;
    }

    .divider {
      height: 2px;
      background: var(--rojo);
      border: 0;
      margin: 1rem 0 1.3rem;
    }

    .search-wrap {
      margin: 0 0 1rem;
    }

    .search-input {
      width: 100%;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      padding: 0.6rem 0.75rem;
      font-size: 0.95rem;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--rojo);
      box-shadow: 0 0 0 2px rgba(179, 0, 0, 0.15);
    }

    .result-count {
      margin: 0.45rem 0 0;
      font-size: 0.9rem;
      color: #555;
    }

    ol {
      margin: 0;
      padding-left: 1.25rem;
      line-height: 1.6;
    }

    li {
      margin-bottom: 0.7rem;
      border-left: 3px solid transparent;
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }

    li:hover {
      border-left-color: var(--rojo);
      background: var(--gris-suave);
    }

    .ref-link {
      display: block;
      color: inherit;
      text-decoration: none;
      padding: 0.35rem 0.5rem;
      border-radius: 4px;
    }

    .ref-text {
      display: block;
      color: inherit;
      padding: 0.35rem 0.5rem;
      border-radius: 4px;
    }

    .ref-link:focus-visible {
      outline: 2px solid var(--rojo);
      outline-offset: 2px;
    }

    .status {
      margin: 0.8rem 0 0;
      color: #555;
      font-size: 0.92rem;
    }

    @media (max-width: 600px) {
      .card {
        padding: 1.2rem;
      }

      ol {
        padding-left: 1rem;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="logo-wrap">
      <img class="logo" src="logoverticalufpso.png" alt="Logo de la universidad" />
    </div>
    <h1>Referencias Bibliográficas</h1>
    <p class="subtitle">Monografía</p>
    <div class="work-info">
      <p class="work-title"><strong>Título:</strong> Neuroderechos y dignidad humana: desafíos jurídicos frente al
        impacto de las neurotecnologías sobre la privacidad e intimidad mental y cerebral.</p>
      <p class="work-author"><strong>Autor:</strong> Yissel Hernández Guerra</p>
      <p class="work-director"><strong>Director:</strong> Nombre del director</p>
    </div>
    <hr class="divider" />
    <div class="search-wrap">
      <input id="search-input" class="search-input" type="search" placeholder="Buscar por autor, título o año..." />
      <p id="result-count" class="result-count"></p>
    </div>

    <ol id="references-list"></ol>
    <p id="status" class="status" hidden></p>
  </main>

  <script>
    const referencesList = document.getElementById("references-list");
    const searchInput = document.getElementById("search-input");
    const resultCount = document.getElementById("result-count");
    const status = document.getElementById("status");
    let referencesData = [];

    function renderReferences(list) {
      referencesList.innerHTML = "";

      list.forEach((reference) => {
        const item = document.createElement("li");
        const rawUrl = (reference.url || "").trim();
        const hasValidUrl = rawUrl !== "" && rawUrl !== "#";

        if (hasValidUrl) {
          const link = document.createElement("a");
          link.className = "ref-link";
          link.href = rawUrl;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = reference.title;
          item.appendChild(link);
        } else {
          const text = document.createElement("span");
          text.className = "ref-text";
          text.textContent = reference.title;
          item.appendChild(text);
        }

        referencesList.appendChild(item);
      });

      resultCount.textContent = `${list.length} referencia(s) encontrada(s)`;
    }

    function filterReferences() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = referencesData.filter((reference) =>
        reference.title.toLowerCase().includes(query)
      );
      renderReferences(filtered);
    }

    async function loadReferences() {
      try {
        const response = await fetch("referencias.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("No se pudo cargar el archivo de referencias.");
        }

        referencesData = await response.json();
        referencesData.sort((a, b) =>
          (a.title || "").localeCompare((b.title || ""), "es", { sensitivity: "base" })
        );
        renderReferences(referencesData);
      } catch (error) {
        status.hidden = false;
        status.textContent = "No fue posible cargar las referencias. Usa un servidor local para abrir esta página.";
        console.error(error);
      }
    }

    searchInput.addEventListener("input", filterReferences);
    loadReferences();
  </script>
</body>

</html>
